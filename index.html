<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaPlus Chile - ERP Financiero</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
        .erp-seccion { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 1000px; margin: 0 auto; }
        .grid-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .kpi-card { background: #f9fafb; padding: 20px; border-radius: 6px; border-left: 5px solid #10b981; }
        .kpi-card h3 { margin: 5px 0 0 0; font-size: 24px; color: #111827; }
        select, button { padding: 8px 12px; border-radius: 4px; border: 1px solid #d1d5db; }
        button { background: #059669; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #047857; }
    </style>
</head>
<body>

<div id="seccion-control-gestion" class="erp-seccion">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>📊 Control de Gestión y Directorio (ContaPlus)</h2>
        
        <div style="display: flex; gap: 10px;">
            <select id="selector-mes-gestion" onchange="cargarDashboardGestion()">
                <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                <option value="4">Abril</option><option value="5">Mayo</option><option value="6" selected>Junio</option>
                <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
            </select>
            <select id="selector-anio-gestion" onchange="cargarDashboardGestion()">
                <option value="2026" selected>2026</option>
                <option value="2025">2025</option>
            </select>
        </div>
    </div>

    <div id="contenedor-error-gestion" style="display: none; margin-bottom: 20px;"></div>

    <div class="grid-kpis">
        <div class="kpi-card">
            <span style="color: #6b7280; font-size: 14px;">Margen Neto Real</span>
            <h3 id="kpi-margen-neto">$ 0</h3>
        </div>
        <div class="kpi-card" style="border-left-color: #3b82f6;">
            <span style="color: #6b7280; font-size: 14px;">Ratio de Liquidez</span>
            <h3 id="kpi-liquidez">0.00</h3>
        </div>
        <div class="kpi-card" style="border-left-color: #f59e0b;">
            <span style="color: #6b7280; font-size: 14px;">Punto de Equilibrio</span>
            <h3 id="kpi-equilibrio">Día 0</h3>
        </div>
    </div>
</div>

<!-- Scripts de Conexión Básica -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Configura aquí tus credenciales de Supabase si es necesario
const supabaseUrl = "https://qtrkwadzqagywaoiegdl.supabase.co";
const supabaseAnonKey = "TU_ANON_KEY"; 
const supabase = window.supabase ? createClient(supabaseUrl, supabaseAnonKey) : null;

async function cargarDashboardGestion() {
    const idEmpresaActual = window.empresaActualId || localStorage.getItem("company_id");
    let anioSeleccionado = document.getElementById("selector-anio-gestion")?.value || 2026;
    let mesSeleccionado = document.getElementById("selector-mes-gestion")?.value || 6;

    const contenedorError = document.getElementById("contenedor-error-gestion");
    if (contenedorError) contenedorError.style.display = "none";

    if (!supabase) return;

    try {
        const [dv, kp] = await Promise.all([
          supabase.rpc("fn_budget_vs_actual", { p_company_id: idEmpresaActual, p_year: Number(anioSeleccionado), p_month: Number(mesSeleccionado) }),
          supabase.rpc("fn_kpis_gestion",     { p_company_id: idEmpresaActual, p_year: Number(anioSeleccionado), p_month: Number(mesSeleccionado) }),
        ]);

        if (dv.error || kp.error) {
            mostrarErrorDashboard(`⚠️ Error en Base de Datos: ${dv.error?.message || kp.error?.message}`);
            return;
        }

        if (kp.data) {
            document.getElementById("kpi-margen-neto").innerText = new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(kp.data.margen_neto || 0);
            document.getElementById("kpi-liquidez").innerText = Number(kp.data.ratio_liquidez || 0).toFixed(2);
            document.getElementById("kpi-equilibrio").innerText = kp.data.dia_punto_equilibrio > 0 ? `Día ${kp.data.dia_punto_equilibrio}` : "No alcanzado";
        }
    } catch (err) {
        mostrarErrorDashboard(`Error: ${err.message}`);
    }
}

function mostrarErrorDashboard(mensaje) {
    const contenedorError = document.getElementById("contenedor-error-gestion");
    if (contenedorError) {
        contenedorError.innerText = mensaje;
        contenedorError.style.display = "block";
        contenedorError.style.padding = "12px";
        contenedorError.style.background = "#fee2e2";
        contenedorError.style.color = "#991b1b";
        contenedorError.style.borderRadius = "6px";
    }
}
</script>
</body>
</html>
